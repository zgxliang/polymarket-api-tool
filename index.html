<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polymarket API Key 派生</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
      position: relative;
    }
    .build-info {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      display: inline-block;
      margin-top: 15px;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .build-info .time {
      font-weight: 700;
      color: #fff;
    }
    .content { padding: 30px; }
    .step { display: none; }
    .step.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .wallet-card {
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px;
      margin: 10px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: all 0.3s;
    }
    .wallet-card:hover { border-color: #667eea; background: #f8f9ff; }
    .wallet-icon { width: 50px; height: 50px; border-radius: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; margin-right: 15px; }
    
    .status { padding: 20px; border-radius: 12px; text-align: center; margin: 20px 0; }
    .status.loading { background: #e3f2fd; color: #1565c0; }
    .status.success { background: #e8f5e9; color: #2e7d32; }
    .status.error { background: #ffebee; color: #c62828; }
    
    .result-box { background: #f5f5f5; padding: 20px; border-radius: 12px; margin-top: 20px; }
    .cred-row { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .cred-value { font-family: monospace; font-size: 13px; max-width: 60%; overflow: hidden; text-overflow: ellipsis; }
    .copy-btn { background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔮 Polymarket API Key</h1>
      <p>一键获取你的 API 凭证</p>
      <div class="build-info">
        🕐 版本: <span class="time">2026-03-19 18:30</span> | 编译通过 ✅
      </div>
    </div>
    
    <div class="content">
      <!-- 步骤 1 -->
      <div class="step active" id="step1">
        <p style="text-align:center; color:#666; margin-bottom:20px;">选择钱包</p>
        <div class="wallet-card" onclick="connectWallet('metamask')">
          <div class="wallet-icon">🦊</div>
          <div><strong>MetaMask</strong><br><small>连接 MetaMask</small></div>
        </div>
        <div class="wallet-card" onclick="connectWallet('okx')">
          <div class="wallet-icon">🔷</div>
          <div><strong>OKX Wallet</strong><br><small>连接 OKX</small></div>
        </div>
        <div class="wallet-card" onclick="connectWallet('rabby')">
          <div class="wallet-icon">🛡️</div>
          <div><strong>Rabby</strong><br><small>连接 Rabby</small></div>
        </div>
      </div>
      
      <!-- 步骤 2 -->
      <div class="step" id="step2">
        <div class="status loading"><p id="step2-text">正在连接钱包...</p></div>
      </div>
      
      <!-- 步骤 3 -->
      <div class="step" id="step3">
        <div class="status loading"><p>正在获取 API Key...</p></div>
      </div>
      
      <!-- 步骤 4: 结果 -->
      <div class="step" id="step4">
        <div id="result-success" style="display:none;">
          <div class="status success">✅ API Key 获取成功！</div>
          
          <div class="result-box">
            <div class="cred-row"><span>API Key</span><div><span class="cred-value" id="apiKey"></span><button class="copy-btn" onclick="copy('apiKey')">复制</button></div></div>
            <div class="cred-row"><span>API Secret</span><div><span class="cred-value" id="apiSecret"></span><button class="copy-btn" onclick="copy('apiSecret')">复制</button></div></div>
            <div class="cred-row"><span>Passphrase</span><div><span class="cred-value" id="passphrase"></span><button class="copy-btn" onclick="copy('passphrase')">复制</button></div></div>
          </div>
          
          <button class="btn btn-primary" onclick="downloadEnv()">📥 下载 .env</button>
          <button class="btn" onclick="location.reload()" style="background:#f5f5f5;color:#333;">🔄 重新获取</button>
        </div>
        
        <div id="result-error" style="display:none;">
          <div class="status error">❌ 获取失败</div>
          <p id="errorMsg" style="color:#c62828;text-align:center;margin-top:15px;"></p>
          <button class="btn" onclick="location.reload()" style="background:#f5f5f5;color:#333;">🔄 重试</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let signer, address, signature, timestamp, nonce;
    
    function show(id) { document.getElementById(id).classList.add('active'); }
    function hide(id) { document.getElementById(id).classList.remove('active'); }
    
    async function connectWallet(type) {
      hide('step1'); show('step2');
      
      try {
        let provider = window.ethereum;
        if (type === 'okx' && window.okxwallet) provider = window.okxwallet;
        if (type === 'rabby' && window.rabby) provider = window.rabby;
        if (window.ethereum?.providers) {
          const found = window.ethereum.providers.find(p => 
            type === 'metamask' ? p.isMetaMask : type === 'okx' ? p.isOkxWallet : p.isRabby
          );
          if (found) provider = found;
        }
        
        if (!provider) throw new Error('未检测到钱包');
        
        const web3Provider = new ethers.providers.Web3Provider(provider);
        await web3Provider.send('eth_requestAccounts', []);
        signer = web3Provider.getSigner();
        address = await signer.getAddress();
        
        document.getElementById('step2-text').textContent = '请在钱包中确认签名...';
        await requestSignature();
        
      } catch (err) {
        alert(err.message);
        location.reload();
      }
    }
    
    async function requestSignature() {
      const domain = { name: "ClobAuthDomain", version: "1", chainId: 137 };
      const types = { ClobAuth: [
        { name: "address", type: "address" },
        { name: "timestamp", type: "string" },
        { name: "nonce", type: "uint256" },
        { name: "message", type: "string" }
      ]};
      
      timestamp = Math.floor(Date.now() / 1000).toString();
      nonce = Math.floor(Math.random() * 1000000);
      
      const message = { address, timestamp, nonce, message: "This message attests that I control the given wallet" };
      signature = await signer._signTypedData(domain, types, message);
      
      hide('step2'); show('step3');
      await getApiKey();
    }
    
    async function getApiKey() {
      try {
        // 调用 Vercel API
        const response = await fetch('/api', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address, signature, timestamp, nonce })
        });
        
        const data = await response.json();
        
        if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
        
        document.getElementById('apiKey').textContent = data.apiKey;
        document.getElementById('apiSecret').textContent = data.secret;
        document.getElementById('passphrase').textContent = data.passphrase;
        
        hide('step3'); show('step4');
        document.getElementById('result-success').style.display = 'block';
        
      } catch (err) {
        hide('step3'); show('step4');
        document.getElementById('result-error').style.display = 'block';
        document.getElementById('errorMsg').textContent = err.message;
      }
    }
    
    function copy(id) {
      navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
        const btn = event.target;
        btn.textContent = '✓';
        setTimeout(() => btn.textContent = '复制', 1500);
      });
    }
    
    function downloadEnv() {
      const content = `POLYMARKET_API_KEY=${document.getElementById('apiKey').textContent}
POLYMARKET_API_SECRET=${document.getElementById('apiSecret').textContent}
POLYMARKET_API_PASSPHRASE=${document.getElementById('passphrase').textContent}
`;
      const blob = new Blob([content], {type:'text/plain'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'polymarket-api.env';
      a.click();
    }
  </script>
</body>
</html>
